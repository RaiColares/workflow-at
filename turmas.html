<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turmas - Workflow da Secretaria</title>
  <link rel="icon" href="assets/images/logo-rai.webp">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="page-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 style="font-size:20px;color:var(--primary);">Gestão de Turmas</h2>
      <button class="btn btn-primary" onclick="openModal()">+ Nova Turma</button>
    </div>

    <div class="card">
      <div class="table-container">
        <table id="turmasTable">
          <thead>
            <tr>
              <th>Curso</th>
              <th>Turma</th>
              <th>Modalidade</th>
              <th>Assistente</th>
              <th style="width:120px;">Ações</th>
            </tr>
          </thead>
          <tbody id="turmasBody">
          </tbody>
        </table>
      </div>
      <div id="turmasEmpty" class="empty-state" style="display:none;">
        <p>Nenhuma turma cadastrada.</p>
      </div>
    </div>

    <div class="modal-overlay" id="turmaModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Nova Turma</h3>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <form id="turmaForm">
          <input type="hidden" id="turmaId">
          <div class="form-group">
            <label class="form-label">Curso <span style="color:var(--red)">*</span></label>
            <input type="text" class="form-input" id="turmaCurso"
                   placeholder="Ex: Administração" required>
          </div>
          <div class="form-group">
            <label class="form-label">Turma <span style="color:var(--red)">*</span></label>
            <input type="text" class="form-input" id="turmaNome"
                   placeholder="Ex: P1MIA01" required>
          </div>
          <div class="form-group">
            <label class="form-label">Modalidade</label>
            <select class="form-select" id="turmaModalidade">
              <option value="">Selecione</option>
              <option value="Integrado">Integrado</option>
              <option value="Subsequente">Subsequente</option>
              <option value="EJATEC">EJATEC</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Assistente responsável <span style="color:var(--red)">*</span></label>
            <select class="form-select" id="turmaAssistente" required>
              <option value="">Selecione um assistente</option>
              <option value="2">Wal</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="turmaSubmitBtn">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/layout.js"></script>
  <script>
    let editingId = null;
    let turmasCache = [];
    let assistentesCache = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const user = requireRole('secretario');
      if (!user) return;
      await carregarAssistentes();
      await carregarTurmas();
    });

    async function carregarTurmas() {
      const res = await apiRequest('listar_turmas');
      turmasCache = res.success ? res.turmas : [];

      const tbody = document.getElementById('turmasBody');
      const empty = document.getElementById('turmasEmpty');

      tbody.innerHTML = '';

      if (turmasCache.length === 0) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      turmasCache.forEach(t => {
        const assistenteNome = assistentesCache.find(a => a.id === t.assistente_id)?.nome || '—';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${t.curso}</td>
          <td><strong>${t.turma}</strong></td>
          <td>${t.modalidade || '—'}</td>
          <td>${assistenteNome}</td>
          <td>
            <div class="actions">
              <button class="btn btn-outline btn-sm" onclick="editarTurma('${t.id}')">
                Editar
              </button>
              <button class="btn btn-red btn-sm" onclick="excluirTurma('${t.id}')">
                Excluir
              </button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function carregarAssistentes() {
      const res = await apiRequest('listar_usuarios');
      assistentesCache = res.success
        ? res.usuarios.filter(u => u.perfil === 'assistente' && u.ativo !== false)
        : [];

      const select = document.getElementById('turmaAssistente');
      select.innerHTML = '<option value="">Selecione um assistente</option>' +
        assistentesCache.map(a =>
          `<option value="${a.id}">${a.nome}</option>`
        ).join('');
    }

    function openModal() {
      editingId = null;
      document.getElementById('turmaForm').reset();
      document.getElementById('turmaId').value = '';
      document.getElementById('modalTitle').textContent = 'Nova Turma';
      document.getElementById('turmaSubmitBtn').textContent = 'Salvar';
      document.getElementById('turmaModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('turmaModal').classList.remove('open');
    }

    function editarTurma(id) {
      const t = turmasCache.find(x => x.id === id);
      if (!t) return;

      editingId = id;
      document.getElementById('modalTitle').textContent = 'Editar Turma';
      document.getElementById('turmaSubmitBtn').textContent = 'Atualizar';
      document.getElementById('turmaId').value = id;
      document.getElementById('turmaCurso').value = t.curso;
      document.getElementById('turmaNome').value = t.turma;
      document.getElementById('turmaModalidade').value = t.modalidade || '';
      document.getElementById('turmaAssistente').value = t.assistente_id || '';

      document.getElementById('turmaModal').classList.add('open');
    }

    async function excluirTurma(id) {
      if (!confirm('Tem certeza que deseja excluir esta turma?')) return;

      const res = await apiRequest('excluir_turma', { id });

      if (!res.success) {
        showToast(res.error || 'Erro ao excluir turma.', 'error');
        return;
      }

      await carregarTurmas();
      showToast('Turma excluída com sucesso!');
    }

    document.getElementById('turmaForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const curso = document.getElementById('turmaCurso').value.trim();
      const turma = document.getElementById('turmaNome').value.trim();
      const modalidade = document.getElementById('turmaModalidade').value;
      const assistenteId = document.getElementById('turmaAssistente').value;

      if (!curso || !turma || !assistenteId) {
        showToast('Preencha todos os campos obrigatórios.', 'error');
        return;
      }

      const payload = {
        curso, turma, modalidade, assistente_id: assistenteId,
      };

      const id = document.getElementById('turmaId').value;
      if (id) payload.id = id;

      const res = await apiRequest('salvar_turma', payload);

      if (!res.success) {
        showToast(res.error || 'Erro ao salvar turma.', 'error');
        return;
      }

      await carregarTurmas();
      closeModal();
      showToast(editingId ? 'Turma atualizada!' : 'Turma cadastrada!');
    });

    document.getElementById('turmaModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
